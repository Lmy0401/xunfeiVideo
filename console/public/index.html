<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>输入法视频控制台</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Xunfei Video Console</p>
            <h1>输入法录制任务</h1>
          </div>
          <div class="status-strip">
            <span id="deviceState" class="state">设备检测中</span>
            <button id="refreshBtn" class="icon-btn" title="刷新设备状态">↻</button>
          </div>
        </header>

        <section class="task-panel">
          <div class="sequence-head">
            <div>
              <label>聊天顺序</label>
              <p>按列表从上到下执行</p>
            </div>
            <div class="sequence-actions">
              <button id="addMineBtn" class="text-btn" type="button">添加我方</button>
              <button id="addOtherBtn" class="text-btn" type="button">添加对方</button>
              <button id="addKeysBtn" class="text-btn" type="button">添加按键</button>
            </div>
          </div>

          <div class="task-tools">
            <div class="field">
              <label for="taskNameInput">任务名称</label>
              <input id="taskNameInput" type="text" value="清新壁纸-聊天演示-01">
            </div>
            <div class="field">
              <label for="taskSelect">已保存任务</label>
              <select id="taskSelect">
                <option value="">暂无保存任务</option>
              </select>
            </div>
            <button id="saveTaskBtn" class="secondary-btn compact-btn" type="button">保存任务</button>
            <button id="loadTaskBtn" class="secondary-btn compact-btn" type="button">加载任务</button>
          </div>

          <div class="format-hint">
            <strong>输入格式</strong>
            <span>我方/对方：直接输入中文句子。</span>
            <span>按键：输入字母、中文标点或 token，如 <code>{backspace}</code>、<code>{space}</code>、<code>？</code>、<code>！</code>、<code>，</code>、<code>。</code>。</span>
            <span>26键符号：也可写 <code>{question}</code>、<code>{exclamation}</code>、<code>{comma}</code>、<code>{period}</code>，会按中文符号页坐标输入。</span>
            <span>组合示例：<code>{backspace}！{abc}</code>，次数表示整段按键重复执行。</span>
          </div>

          <div id="messageList" class="message-list"></div>

          <div class="controls-grid">
            <div class="field">
              <label>键盘布局</label>
              <div class="segmented" role="group" aria-label="键盘布局">
                <button class="segment active" data-layout="qwerty" type="button">26键</button>
                <button class="segment" data-layout="nine" type="button">九宫格</button>
              </div>
            </div>

            <div class="field">
              <label for="delayInput">按键间隔</label>
              <div class="number-row">
                <input id="delayInput" type="number" min="0" max="800" step="10" value="10">
                <span>ms</span>
              </div>
            </div>

            <div class="field">
              <label for="commitDelayInput">提交间隔</label>
              <div class="number-row">
                <input id="commitDelayInput" type="number" min="0" max="2000" step="10" value="20">
                <span>ms</span>
              </div>
            </div>

            <div class="field">
              <label for="startDelayInput">开打前等待</label>
              <div class="number-row">
                <input id="startDelayInput" type="number" min="0" max="3000" step="10" value="20">
                <span>ms</span>
              </div>
            </div>

            <div class="field">
              <label for="candidateInput">候选词</label>
              <select id="candidateInput">
                <option value="0">不点击</option>
                <option value="1">点击第 1 个</option>
                <option value="2">点击第 2 个</option>
                <option value="3">点击第 3 个</option>
                <option value="4">点击第 4 个</option>
                <option value="5">点击第 5 个</option>
              </select>
            </div>

            <div class="field">
              <label for="finalSourceInput">最终文本</label>
              <select id="finalSourceInput">
                <option value="commit">发送内容</option>
                <option value="candidate">候选词</option>
              </select>
            </div>

            <div class="field output-field">
              <label for="outputDirInput">视频输出文件夹</label>
              <div class="path-row">
                <input id="outputDirInput" type="text" value="recordings" placeholder="请选择本地文件夹">
                <button id="selectOutputDirBtn" class="text-btn path-btn" type="button">选择文件夹</button>
              </div>
            </div>

            <div class="field output-field">
              <label for="videoNameInput">视频文件名</label>
              <input id="videoNameInput" type="text" value="screenrecord.mp4" placeholder="例如 清新壁纸演示.mp4">
            </div>
          </div>

          <div class="switch-row">
            <label class="switch">
              <input id="ensureImeInput" type="checkbox" checked>
              <span></span>
              自动唤起输入法
            </label>
            <label class="switch">
              <input id="sendInput" type="checkbox" checked>
              <span></span>
              自动发送
            </label>
          </div>

          <footer class="actions">
            <button id="runBtn" class="primary-btn" type="button">开始执行</button>
            <button id="recordBtn" class="secondary-btn" type="button">录制并拉取视频</button>
          </footer>
        </section>
      </section>

      <aside class="side-panel">
        <div class="meter">
          <span>当前流程</span>
          <strong id="flowLabel">待执行</strong>
        </div>
        <div class="log-card">
          <div class="log-head">
            <span>运行日志</span>
            <button id="clearLogBtn" class="text-btn" type="button">清空</button>
          </div>
          <pre id="logOutput"></pre>
        </div>
        <div class="history-card">
          <div class="log-head">
            <span>最近录制</span>
            <button id="refreshRecordingsBtn" class="text-btn" type="button">刷新</button>
          </div>
          <div id="recordingList" class="recording-list"></div>
        </div>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
